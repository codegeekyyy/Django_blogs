{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
{% include 'dashboard/sidebar.html' %}
<div class="col-md-9">
    <h2>Edit Post: {{ post.title }}</h2>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" class="btn btn-primary">Update Post</button>
    </form>
</div>
</div>

{% endblock %}
